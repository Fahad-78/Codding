<!DOCTYPE html>
<html>
    <head>
        <title>How to add audio</title>
    </head>
    <body>
        <audio controls>
            <source src="audios/About You.mp3" type="audio/mpeg">
        </audio>
        <br>
        <audio controls autoplay>
            <source src="audios/About You.mp3" type="audio/mpeg">
        </audio>
        <br>
        <audio controls autoplay muted>
            <source src="audios/About You.mp3" type="audio/mpeg">
        </audio>
        <br>
        <audio controls autoplay muted loop>
            <source src="audios/About You.mp3" type="audio/mpeg">
        </audio>
    </body>
</html>
