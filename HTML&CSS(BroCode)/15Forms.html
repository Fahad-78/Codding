<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="spongebob"  minlength="6" maxlength="10" required><br>
        <br>
        <label for="password">password:</label>
        <input type="password" id="password" placeholder="kanekiken7878"><br>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="abcd@gmail.com"><br>
        <br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" placeholder="01741116258" pattern="[0-9]{11}"><br>
        <br>
        <label for="bdday">Birthday:</label>
        <input type="date" id="bdday"><br>
        <br>
        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" min="0" max="99"><br>
       
        <label for="mr.">mr.</label>
        <input  type="radio" id="mr." value="mr." name="title"><br>
        <label for="ms.">ms.</label>
        <input  type="radio" id="ms." value="ms." name="title"><br>
        <label for="phd.">phd.</label>
        <input  type="radio" id="phd." value="phd." name="title"><br>
        <br>
        <label for="payment">Payment:</label>
        <select id="payment">
            <option value="visa">visa</option>
            <option value="mastercard">mastercard</option>
            <option value="giftcard">giftcard</option>
        </select> <br>
        <br>
        <label for="subscribe">Subscribe:</label>
        <input type="checkbox" id="subscribe"><br>
        <br>
        <label for="comment">Comment:</label>
        <textarea id="comment" row="3" cols="25"></textarea>
        <br>
        <label for:file>File:</label>
        <input type="file" id="file"><br>
        <br>
        
        <input type="reset">
        <input type="submit">
    </form>
</body>
</html>
